<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container mt-5">

        <section id="search-section" class="mb-5">
            <form role="search">
                <label for="site-search" class="mb-2 fw-bold">Search the hotels</label>
                <div class="row g-2 align-items-center">
                    <div class="col-md-3">
                        <input class="form-control" type="search" id="site-search" name="q" placeholder="Search...">
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" type="date" id="checkin-date" name="checkin">
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" type="date" id="checkout-date" name="checkout">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="guests" id="guests">
                            <option value="1 Guest 1 Room">1 Guest 1 Room</option>
                            <option value="2 Guest 1 Room">2 Guest 1 Room</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Search</button>
                    </div>
                </div>
            </form>

        </section>

        <section id="deals-section" class="mb-5">
            <h2 class="mb-4">Deals and Discounts</h2>
            <div class="row" id="deals-container"></div>

        </section>

        <section id="popular-searches-section" class="mb-5">
            <h2 class="mb-4">Popular Searches</h2>
            <div id="popular-carousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="popular-container"></div>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
