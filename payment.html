<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
</head>

<body>

    <div class="container py-4">
        <form id="paymentForm">
            <section class="form-section mb-4">
                <h2 class="section-title mb-4"> Your Reservation Information</h2>
                <div class="row g-4 mb-3">
                    <div class="col-md-6">
                        <label for="fname" class="form-label">Your name: <span class="required">*</span></label>
                        <input type="text" id="fname" name="firstname" class="form-control" placeholder="First Name"
                            required>
                    </div>
                    <div class="col-md-6">
                        <label for="lname" class="form-label">Your surname: <span class="required">*</span></label>
                        <input type="text" id="lname" name="lastname" class="form-control" placeholder="Last Name"
                            required>
                    </div>
                </div>
                <div class="row g-4 mb-3">
                    <div class="col-md-6">
                        <label for="email" class="form-label">Your E-mail Address: <span
                                class="required">*</span></label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Your phone number: <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="555 555 55 55"
                            required>
                    </div>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="approve1" name="approve" required>
                    <label class="form-check-label" for="approve1">I approve <a href="#">Clarification Text</a>.</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="approve2" name="approve" required>
                    <label class="form-check-label" for="approve2"> I approve <a href="#">Consent Form</a>.</label>
                </div>
            </section>

            <section class="form-section payment-box">
                <h2 class="section-title mb-4">Payment Options</h2>
                <h3 class="payment-subtitle mb-4">Guarantee by Credit Card</h3>
                <div class="mb-3">
                    <label for="cname" class="form-label">Name on the card:</label>
                    <input type="text" id="cname" name="cardname" class="form-control" placeholder="Name on the card"
                        required>
                </div>
                <div class="mb-3">
                    <label for="cnumber" class="form-label">Card number:</label>
                    <input type="text" id="cnumber" name="cardnumber" class="form-control" placeholder="Card Number"
                        required>
                </div>
                <div class="row g-4 mb-3">
                    <div class="col-md-6">
                        <label for="expadate" class="form-label">Expiration Date:</label>
                        <input type="text" id="expadate" name="expirydate" class="form-control" placeholder="MM/YY"
                            required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="cvc" class="form-label">Security Number:</label>
                    <input type="text" id="cvc" name="cvc" class="form-control" placeholder="CVC" required>
                </div>
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="approve3" name="approve" required>
                    <label class="form-check-label" for="approve3">I have read <a href="#">Preliminary Information Form</a> and <a
                            href="#">Distance Sales Contract</a> and I agree.</label>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary submit-btn">Complete the booking</button>
                </div>
            </section>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
