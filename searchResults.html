<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    
    <header class="bg-white shadow-sm py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold text-primary">HotelFinder</h1>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-house-door"></i> Back to Home
            </a>
        </div>
    </header>

    <main class="container">
        
        <section id="search-section" class="bg-white p-4 rounded shadow-sm mb-5">
            <form role="search" id="search-form">
        <label for="site-search" class="mb-2 fw-bold">Search the hotels</label>
        <div class="row g-2 align-items-center">
            <div class="col-md-3">
                <input class="form-control" type="search" id="site-search" name="q" placeholder="Search..." required>
            </div>
            <div class="col-md-2">
                <input class="form-control" type="date" id="checkin-date" name="checkin" required>
            </div>
            <div class="col-md-2">
                <input class="form-control" type="date" id="checkout-date" name="checkout" required>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="guests" id="guests">
                    <option value="1 Guest 1 Room">1 Guest 1 Room</option>
                    <option value="2 Guest 1 Room">2 Guest 1 Room</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" type="submit">Search</button>
            </div>
        </div>
    </form>
        </section>

        <section id="results-section" class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h3 mb-0 fw-bold">Search Results</h2>
            </div>
            
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="search-results-container">
                </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="hotelsData.js"></script>
    <script src="search.js"></script>
</body>
</html>
