<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container mt-5">
        <section id="search-section" class="mb-5">
            <form role="search" id="search-form">
                <label for="site-search" class="mb-2 fw-bold">Search the hotels</label>
                <div class="row g-2 align-items-center">
                    <div class="col-md-3">
                        <input class="form-control" type="search" id="site-search" name="q" placeholder="Search by name or city...">
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" type="date" id="checkin-date" name="checkin" required>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" type="date" id="checkout-date" name="checkout" required>
                    </div>
                    <div class="col-md-3">
                        <input class="form-control" type="number" id="guests" name="guests" min="1" value="1" placeholder="Number of Guests" required>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" type="submit">Search</button>
                    </div>
                </div>
            </form>
        </section>

        <section id="results-section" class="mb-5">
            <h2 class="mb-4">Search Results</h2>
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="search-results-container">
                </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="search.js"></script>
</body>
</html>
